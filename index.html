<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稅務法規備考</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --paper-dark: #ede7d9;
    --gold: #b8960c;
    --gold-light: #d4aa1a;
    --moss: #2d4a2d;
    --moss-light: #3d6b3d;
    --moss-pale: #e8f0e8;
    --red: #8b2020;
    --red-pale: #fdf0f0;
    --slate: #4a5568;
    --border: #c8bfa8;
    --shadow: rgba(26,26,24,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--moss);
    color: var(--paper);
    padding: 16px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .header-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
  }
  .header-top h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: .05em;
  }
  .header-top .subtitle {
    font-size: .75rem;
    opacity: .7;
    letter-spacing: .08em;
  }
  .stats-bar {
    display: flex;
    gap: 16px;
    font-size: .72rem;
    opacity: .85;
    margin-bottom: 12px;
  }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: #6fcf6f; }
  .dot-red   { background: #e07070; }
  .dot-gold  { background: var(--gold-light); }

  /* ── TABS ── */
  nav.tabs {
    display: flex;
    gap: 0;
  }
  nav.tabs button {
    flex: 1;
    background: transparent;
    border: none;
    color: rgba(245,240,232,.65);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .82rem;
    padding: 8px 4px 10px;
    cursor: pointer;
    position: relative;
    transition: color .2s;
    letter-spacing: .04em;
  }
  nav.tabs button.active {
    color: var(--paper);
    font-weight: 700;
  }
  nav.tabs button.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 2.5px;
    background: var(--gold-light);
    border-radius: 2px 2px 0 0;
  }

  /* ── MAIN ── */
  main { padding: 16px; max-width: 680px; margin: 0 auto; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── FILTER BAR ── */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  select, .filter-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .78rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: white;
    color: var(--ink);
    padding: 6px 10px;
    cursor: pointer;
  }
  select { flex: 1; min-width: 130px; }
  .filter-btn {
    background: var(--moss);
    color: var(--paper);
    border-color: var(--moss);
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--red);
    border-color: var(--red);
  }

  /* ── QUIZ CARD ── */
  .quiz-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .quiz-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: .68rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .tag-law  { background: var(--moss-pale); color: var(--moss); border: 1px solid #c0d4c0; }
  .tag-year { background: var(--paper-dark); color: var(--slate); border: 1px solid var(--border); }
  .tag-wrong { background: var(--red-pale); color: var(--red); border: 1px solid #f0c0c0; }

  .quiz-q {
    font-size: .9rem;
    line-height: 1.75;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    text-align: left;
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .84rem;
    cursor: pointer;
    line-height: 1.6;
    transition: background .15s, border-color .15s;
  }
  .option-btn:hover { background: var(--moss-pale); border-color: var(--moss-light); }
  .option-btn.correct { background: #e8f7e8; border-color: #4caf50; color: #1b5e1b; font-weight: 700; }
  .option-btn.wrong   { background: var(--red-pale); border-color: #e07070; color: var(--red); }
  .option-btn.reveal  { background: #f0f7e8; border-color: #8bc34a; }
  .option-btn:disabled { cursor: default; }

  .quiz-explain {
    margin-top: 12px;
    font-size: .8rem;
    line-height: 1.7;
    background: var(--paper-dark);
    border-left: 3px solid var(--gold);
    padding: 10px 12px;
    border-radius: 0 6px 6px 0;
    display: none;
    color: var(--slate);
  }
  .quiz-explain.show { display: block; }

  .quiz-nav {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .82rem;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: opacity .15s;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--moss); color: var(--paper); }
  .btn-gold    { background: var(--gold); color: white; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
  .btn-red     { background: var(--red); color: white; }

  .quiz-progress {
    text-align: center;
    font-size: .75rem;
    color: var(--slate);
    margin-bottom: 14px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--paper-dark);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--moss-light), var(--gold));
    border-radius: 2px;
    transition: width .3s ease;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--slate);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: .85rem; line-height: 1.7; }

  /* ── FLASHCARD ── */
  .fc-filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .fc-tag-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .75rem;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    transition: all .15s;
  }
  .fc-tag-btn.active-num  { background: #e8f0e8; border-color: var(--moss); color: var(--moss); font-weight: 700; }
  .fc-tag-btn.active-text { background: #fff8e0; border-color: var(--gold); color: #7a6000; font-weight: 700; }
  .fc-tag-btn.active-quiz { background: #f0e8f7; border-color: #7c4a9e; color: #5a3275; font-weight: 700; }
  .fc-tag-btn.active-all  { background: var(--moss); border-color: var(--moss); color: white; font-weight: 700; }

  .fc-scene {
    perspective: 1000px;
    margin-bottom: 14px;
    height: 280px;
  }
  .fc-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
  }
  .fc-inner.flipped { transform: rotateY(180deg); }
  .fc-face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .fc-front {
    background: var(--moss);
    color: var(--paper);
    border: 2px solid var(--moss-light);
  }
  .fc-back {
    background: white;
    color: var(--ink);
    border: 2px solid var(--border);
    transform: rotateY(180deg);
  }
  .fc-type-badge {
    font-size: .65rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: .06em;
  }
  .fc-front .fc-type-badge { background: rgba(255,255,255,.2); color: var(--paper); }
  .fc-q { font-size: 1rem; line-height: 1.65; font-weight: 500; }
  .fc-front .fc-q { color: var(--paper); }
  .fc-hint { font-size: .7rem; opacity: .6; margin-top: 10px; }
  .fc-a { font-size: .92rem; line-height: 1.7; color: var(--moss); font-weight: 600; white-space: pre-line; text-align: left; }
  .fc-source { font-size: .68rem; color: var(--slate); margin-top: 8px; }

  .fc-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .fc-score {
    text-align: center;
    font-size: .8rem;
    color: var(--slate);
    margin-bottom: 14px;
  }
  .fc-score span { font-weight: 700; }
  .fc-score .s-know { color: var(--moss); }
  .fc-score .s-dk   { color: var(--red); }

  .fc-counter {
    text-align: center;
    font-size: .75rem;
    color: var(--slate);
    margin-bottom: 8px;
  }

  /* ── STATUTE BROWSER (LINK CARDS) ── */
  .law-link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    text-decoration: none;
    color: var(--ink);
    transition: all .15s;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .law-link-card:hover {
    background: var(--moss-pale);
    border-color: var(--moss);
    transform: translateY(-1px);
    box-shadow: 0 4px 10px var(--shadow);
  }
  .law-link-card:active { transform: translateY(0); }
  .law-link-icon {
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .law-link-name {
    flex: 1;
    font-family: 'Noto Serif TC', serif;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .03em;
  }
  .law-link-arrow {
    color: var(--gold);
    font-size: 1.1rem;
    font-weight: 700;
  }
  .statute-hint {
    text-align: center;
    font-size: .75rem;
    color: var(--slate);
    margin: 12px 0 18px;
    font-style: italic;
  }

  /* ── STATUTE BROWSER (legacy, unused) ── */
  .law-group { margin-bottom: 18px; }
  .law-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--moss);
    color: var(--paper);
    padding: 11px 14px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    font-size: .9rem;
    font-weight: 600;
    letter-spacing: .04em;
  }
  .law-group-header .arrow { transition: transform .25s; font-size: .8rem; }
  .law-group-header.open .arrow { transform: rotate(90deg); }
  .chapter-list { border: 1.5px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .chapter-item {
    border-bottom: 1px solid var(--paper-dark);
    overflow: hidden;
  }
  .chapter-item:last-child { border-bottom: none; }
  .chapter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    background: white;
    font-size: .85rem;
    font-weight: 500;
    transition: background .15s;
  }
  .chapter-header:hover { background: var(--moss-pale); }
  .chapter-header .ch-arrow { font-size: .7rem; color: var(--slate); transition: transform .2s; }
  .chapter-header.open .ch-arrow { transform: rotate(90deg); }
  .statute-content {
    display: none;
    padding: 12px 14px;
    background: var(--paper);
    border-top: 1px solid var(--paper-dark);
    font-size: .8rem;
    line-height: 1.85;
    color: var(--slate);
  }
  .statute-content.show { display: block; }
  .statute-item {
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--border);
  }
  .statute-item:last-child { border-bottom: none; margin-bottom: 0; }
  .statute-label {
    font-size: .68rem;
    color: var(--gold);
    font-weight: 700;
    letter-spacing: .05em;
    margin-bottom: 3px;
  }
  .statute-text { color: var(--ink); }
  .placeholder-note {
    font-size: .75rem;
    color: var(--slate);
    font-style: italic;
    padding: 8px 0;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: .8rem;
    color: var(--gold);
    letter-spacing: .12em;
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .badge-count {
    font-size: .65rem;
    background: var(--gold);
    color: white;
    border-radius: 10px;
    padding: 1px 7px;
    font-weight: 700;
    margin-left: 4px;
  }

  /* ── SUMMARY PANEL ── */
  .summary-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: .82rem;
    padding: 5px 0;
    border-bottom: 1px solid var(--paper-dark);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .label { color: var(--slate); }
  .summary-row .value { font-weight: 700; }
  .value.green { color: var(--moss); }
  .value.red   { color: var(--red); }
  .value.gold  { color: var(--gold); }

  .wrong-only-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .78rem;
    color: var(--slate);
    cursor: pointer;
  }
  .toggle-switch {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    transition: background .2s;
  }
  .toggle-switch.on { background: var(--red); }
  .toggle-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    transition: left .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .toggle-switch.on .toggle-knob { left: 18px; }

  @media (max-width: 400px) {
    .fc-q { font-size: .9rem; }
    .quiz-q { font-size: .85rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>⚖ 稅務法規</h1>
    <span class="subtitle">115年會計師高考備考</span>
  </div>
  <div class="stats-bar">
    <span class="stat"><span class="stat-dot dot-green"></span>答對 <strong id="stat-correct">0</strong></span>
    <span class="stat"><span class="stat-dot dot-red"></span>答錯 <strong id="stat-wrong-count">0</strong></span>
    <span class="stat"><span class="stat-dot dot-gold"></span>字卡 <strong id="stat-fc">0</strong> 張認識</span>
  </div>
  <nav class="tabs">
    <button class="active" onclick="switchTab('quiz')">📝 選擇題</button>
    <button onclick="switchTab('flashcard')">🃏 字卡</button>
    <button onclick="switchTab('statute')">📖 法規</button>
  </nav>
</header>

<main>

<!-- ══════════════ TAB 1: QUIZ ══════════════ -->
<div id="tab-quiz" class="tab-panel active">

  <div style="margin-bottom:14px;">
    <div class="filter-row">
      <select id="q-law" onchange="applyFilters()">
        <option value="">全部法規</option>
        <option value="所得稅法">所得稅法及所得基本稅額條例</option>
        <option value="營業稅法">加值型及非加值型營業稅法</option>
        <option value="土地稅法">土地稅法</option>
        <option value="稅捐稽徵法">稅捐稽徵法及納稅者權利保護法</option>
        <option value="遺產贈與稅法">遺產及贈與稅法</option>
      </select>
      <select id="q-chapter" onchange="applyFilters()">
        <option value="">全部章節</option>
      </select>
    </div>
    <div class="filter-row" style="justify-content:space-between;align-items:center;">
      <label class="wrong-only-toggle" onclick="toggleWrongOnly()">
        <div class="toggle-switch" id="wrong-toggle"><div class="toggle-knob"></div></div>
        只顯示錯題
      </label>
      <span id="q-count-label" style="font-size:.75rem;color:var(--slate);">共 0 題</span>
    </div>
  </div>

  <div id="quiz-area">
    <div class="empty-state">
      <div class="icon">📭</div>
      <p>考古題尚未匯入<br><small style="font-size:.75rem;opacity:.7;">請上傳題目後填入 <code>QUIZ_DATA</code> 陣列</small></p>
    </div>
  </div>

</div>

<!-- ══════════════ TAB 2: FLASHCARD ══════════════ -->
<div id="tab-flashcard" class="tab-panel">

  <div class="section-title">字卡記憶</div>

  <div class="fc-filter-row">
    <button class="fc-tag-btn active-all" onclick="setFcFilter('all',this)">全部</button>
    <button class="fc-tag-btn" onclick="setFcFilter('數字',this)">🟢 數字</button>
    <button class="fc-tag-btn" onclick="setFcFilter('條文',this)">🟠 條文</button>
    <button class="fc-tag-btn" onclick="setFcFilter('考題',this)">🟣 考題</button>
    <select id="fc-law-filter" style="font-family:'Noto Sans TC';font-size:.75rem;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;background:white;color:var(--ink);" onchange="renderFlashcard()">
      <option value="">全部法規</option>
      <option value="所得稅法">所得稅法</option>
      <option value="營業稅法">營業稅法</option>
      <option value="土地稅法">土地稅法</option>
      <option value="稅捐稽徵法">稅捐稽徵法</option>
      <option value="遺產贈與稅法">遺產贈與稅法</option>
    </select>
  </div>

  <div class="fc-counter" id="fc-counter">字卡 1 / 1</div>
  <div class="progress-bar"><div class="progress-fill" id="fc-progress" style="width:0%"></div></div>

  <div class="fc-scene" onclick="flipCard()">
    <div class="fc-inner" id="fc-inner">
      <div class="fc-face fc-front" id="fc-front">
        <span class="fc-type-badge" id="fc-type-badge">數字</span>
        <div class="fc-q" id="fc-q">字卡尚未匯入</div>
        <div class="fc-hint">點擊翻面查看答案</div>
      </div>
      <div class="fc-face fc-back" id="fc-back">
        <div class="fc-a" id="fc-a">—</div>
        <div class="fc-source" id="fc-source"></div>
      </div>
    </div>
  </div>

  <div class="fc-actions" id="fc-actions" style="display:none;">
    <button class="btn btn-outline" onclick="fcAnswer(false)">😵 不知道</button>
    <button class="btn btn-primary" onclick="fcAnswer(true)">✅ 知道了</button>
  </div>
  <div style="text-align:center;margin-bottom:12px;">
    <button class="btn btn-outline" onclick="fcSkip(-1)" style="padding:7px 12px;font-size:.75rem;">← 上一張</button>
    <button class="btn btn-outline" onclick="fcSkip(1)"  style="padding:7px 12px;font-size:.75rem;margin-left:6px;">下一張 →</button>
    <button class="btn btn-gold"   onclick="shuffleFc()" style="padding:7px 12px;font-size:.75rem;margin-left:6px;">🔀 洗牌</button>
  </div>

  <div class="fc-score" id="fc-score">
    認識：<span class="s-know" id="fc-know">0</span> 張 ／
    不認識：<span class="s-dk" id="fc-dk">0</span> 張
  </div>

  <div id="fc-empty" class="empty-state" style="display:none;">
    <div class="icon">🃏</div>

    q:'依稅捐稽徵法規定，有關解釋函令的適用原則，下列敘述何者錯誤？',
    options:['財政部依稅法所發布之解釋函令，對據以申請之案件發生效力','解釋函令的法令見解變更時，如有利於納稅義務人者，對於已核課確定的案件不適用之','稅務違章案件裁罰金額或倍數參考表變更時，如有利於納稅義務人者，適用於尚未核課確定的案件','解釋函令的法令見解變更時，如不利於納稅義務人者，一律自發布日起，發生效力'],
    answer:3, explain:'(D)錯誤。依稅捐稽徵法§1-1，解釋函令變更不利於納稅義務人者，自發布日「對於發布日前的案件不適用」（即原則上不溯及既往），而非「一律自發布日起發生效力」（會涵蓋以前案件，反而不利）。其餘敘述均正確。' },

  { id:'q110_23', law:'遺產贈與稅法', chapter:'贈與稅之計算', year:110,
    q:'蔡先生為馬來西亞國民，不具中華民國國籍，110年5月1日以其馬來西亞銀行存款無償為其子償還馬來西亞當地民間借款500萬元；同年6月1日，自馬來西亞銀行匯款300萬元無償為其子購買中華民國境內未上市公司股票，經核算該股票淨值為250萬元。假設蔡先生當年度無其他贈與行為，本件應納贈與稅為何？（本題貨幣單位為新臺幣）',
    options:['3萬元','8萬元','53萬元','58萬元'],
    answer:1, explain:'蔡先生為非中華民國國民，僅就境內財產課贈與稅(§3-1)：\n①償還境外借款（馬來西亞）→ 屬境外財產，不課稅\n②匯款300萬為其子購買境內未上市股票 → 屬境內財產贈與\n贈與額：300萬（以購買價認定）\n應納贈與稅 = (300萬 - 110年免稅額220萬) × 10% = 8萬\n標準答案B。' },

  { id:'q110_24', law:'遺產贈與稅法', chapter:'遺產稅之計算', year:110,
    q:'王先生早年喪偶，3名子女甲、乙、丙事業有成，無奈甲英年早逝，遺有A、B、C、D、E 5名子女，乙為未婚無子女，丙有2名子女，王先生110年3月2日過世，其孫子女均已成年，乙、丙均抛棄繼承，本件遺產稅案的繼承人扣除額為何？',
    options:['350萬','300萬','250萬','100萬'],
    answer:2, explain:'甲先死亡→代位繼承(5名孫子女)。乙無子女、丙拋棄繼承，二人應繼分由甲之代位繼承人均分，丙之子女非繼承人。實際繼承人僅5名孫子女，扣除額 5×50=250萬。標準答案C。' },

  { id:'q110_25', law:'遺產贈與稅法', chapter:'稽徵程序', year:110,
    q:'甲去世後，兒子想把父親留下的上市A公司股票，捐贈給財團法人B文教基金會，於國稅局核發不計入遺產總額證明書多久之內，需將股票交付給基金會，才不會被補徵遺產稅？',
    options:['2年內','1年內','半年內','3個月內'],
    answer:3, explain:'依遺贈稅法施行細則§29-1，須於核發不計入遺產總額證明書之日起3個月內交付。標準答案D。' },

  { id:'q111_01', law:"所得稅法", chapter:"稽徵程序", year:111, q:"依所得稅法規定，有關扣繳義務人之定義，下列何者正確？", options:["有限合夥事業分配盈餘予中華民國境內居住之出資者，扣繳義務人為事業負責人", "會計師事務所每月給付員工之薪資，扣繳義務人為該事務所", "個人承租房屋自住，每月給付房東之租金，扣繳義務人為承租之個人", "公司分配股利予總機構在中華民國境外之營利事業股東，扣繳義務人為公司負責人"], answer:3, explain:'' },
  { id:'q111_02', law:"所得稅法", chapter:"綜合所得稅", year:111, q:"甲為中華民國境內居住之個人，其於110年7月1日死亡，依所得稅法相關規定，下列敘述何者正確？", options:["甲遺有之配偶乙長期居住國外，乙仍應與甲合併辦理110年度綜合所得稅結算申報", "甲之子丙辦理110年度綜合所得稅結算申報時，得將甲列為扶養親屬，惟甲之免稅額應按其該年度死亡前日數占全年日數之比例，換算減除", "甲之子丙依所得稅法第71條之1規定就甲之110年度所得辦理結算申報時，甲適用之基本生活所需之費用，應按該年度死亡前日數，占全年日數之比例換算", "甲之子丙依所得稅法第71條之1規定就甲之110年度所得辦理結算申報時，甲適用之薪資所得特別扣除額，應按該年度死亡前日數，占全年日數之比例換算"], answer:2, explain:'' },
  { id:'q111_03', law:"所得稅法", chapter:"綜合所得稅", year:111, q:"下列何種情形，依所得稅法規定得免計算租賃所得課徵綜合所得稅？", options:["甲將房屋借與他人使用，除簽約時收取押金，約定期滿免返還外，租賃期間未另外收取租金", "乙自行開設公司，將自有房屋作為辦公室使用，未收取租金", "丙將房屋供朋友居住使用，未收取租金", "丁將房屋供朋友經營小吃店，除由朋友負擔該房屋之房屋稅外，未收取租金"], answer:2, explain:'' },
  { id:'q111_04', law:"所得稅法", chapter:"所得基本稅額條例", year:111, q:"甲110年度有下列所得，其於辦理該年度綜合所得稅結算申報時，依所得基本稅額條例規定，何者免計入基本所得額？", options:["取得以父親為要保人於96年投保人壽保險之保險給付（非死亡給付）新臺幣100萬元", "出售我國證券投資信託事業私募證券投資信託基金的受益憑證，獲利新臺幣100萬元", "申報綜合所得稅時減除之非現金捐贈新臺幣100萬元", "出售美國公司發行股票，獲利新臺幣80萬元"], answer:3, explain:'' },
  { id:'q111_05', law:"遺產贈與稅法", chapter:"遺產稅之計算", year:111, q:"A早年喪偶，育有3名子女甲、乙、丙，甲有未滿18足歲的獨生女，乙已婚無子女，丙未婚，嗣A再娶18歲妻，A於111年4月1日過世，甲、乙、丙均抛棄繼承，本件依遺產及贈與稅法規定，配偶扣除額及繼承人扣除額共多少？", options:["543萬元", "643萬元", "693萬元", "793萬元"], answer:1, explain:'' },
  { id:'q111_06', law:"所得稅法", chapter:"營利事業所得稅", year:111, q:"依所得稅法規定，下列情形何者在申報營利事業所得稅時應認列為損益項目？", options:["尚未出售之外幣，因匯率調整而發生之帳面盈益", "尚未出售之長期投資股票，因市價下跌而產生之帳面損失", "因員工退休而給付一筆退休金，該筆退休金完全從過去年度所提撥之退休金準備中支付", "銷貨收入中屬於附贈獎勵積點的部分，客戶尚未兌換該積點"], answer:3, explain:'' },
  { id:'q111_07', law:"所得稅法", chapter:"綜合所得稅", year:111, q:"未婚之甲110年度之所得為股利100萬元及薪資所得120萬元，其申報扶養之父母各有股利6萬元及4萬元，該申報戶邊際稅率為20%，有關甲110年度綜合所得稅結算申報，下列敘述何者正確？", options:["該申報戶之股利，父母可各自選擇合併計稅減除股利可抵減稅額或單一稅率分開計稅", "該申報戶之股利全數適用單一稅率分開計稅，較為有利", "該申報戶之股利全數適用合併計稅減除股利可抵減稅額，較為有利", "該申報戶之全部股利，可抵減之稅額為股利合計數之8.5%"], answer:2, explain:'' },
  { id:'q111_08', law:"所得稅法", chapter:"營利事業所得稅", year:111, q:"外國A公司在中華民國境內設有分公司，A公司轉投資國內上市公司而獲配之股利所得，該筆股利所得課稅方式為何？", options:["依規定扣繳稅款，不計入營利事業所得額", "由A公司境內分公司計入免稅所得", "由A公司境內分公司計入營利事業所得額申報納稅", "該股利非屬中華民國來源所得，無須課稅"], answer:0, explain:'' },
  { id:'q111_09', law:"所得稅法", chapter:"所得基本稅額條例", year:111, q:"乙公司110年度全年度所得額為500萬元，其中包括停徵所得稅之有價證券交易所得額250萬元，及出售土地免稅所得50萬元，其依所得基本稅額條例計算之基本稅額為何？", options:["54萬元", "48萬元", "30萬元", "24萬元"], answer:1, explain:'' },
  { id:'q111_10', law:"所得稅法", chapter:"獎懲", year:111, q:"公司未依規定期限辦理營利事業所得稅結算申報，依所得稅法相關規定，下列敘述何者正確？", options:["公司接到稽徵機關填發之滯報通知書之日起15日內補辦結算申報，按核定應納稅額另徵20%怠報金", "公司接到稽徵機關填發之滯報通知書之日起15日內補辦結算申報，按核定應納稅額另徵10%滯報金", "公司接到稽徵機關填發之滯報通知書後仍未補辦申報，按同業利潤標準核定所得額，補稅並加徵滯納金", "公司接到稽徵機關填發之滯報通知書後補辦結算申報，按補繳稅額加計利息，免予處罰"], answer:1, explain:'' },
  { id:'q111_11', law:"營業稅法", chapter:"總則", year:111, q:"依加值型及非加值型營業稅法規定，有關營業稅之課徵，下列敘述何者錯誤？", options:["營業人因進貨退出或折讓而收回之營業稅額，得於發生進貨退出或折讓之次期進項稅額中扣減之", "加值型及非加值型營業稅法第14條所定之銷售額，為營業人銷售貨物或勞務所收取之全部代價，包括營業人在貨物或勞務之價額外收取之一切費用。但本次銷售之營業稅額不在其內", "營業人自用乘人小汽車之進項稅額，不得扣抵銷項稅額", "典當業得依查定之銷售額計算之"], answer:0, explain:'' },
  { id:'q111_12', law:"營業稅法", chapter:"減免範圍", year:111, q:"依加值型及非加值型營業稅法規定，營業人銷售下列何種貨物或勞務，不適用免徵營業稅？", options:["報社銷售之廣告及電視臺之廣告播映", "土地", "碾米加工", "依第四章第二節規定計算稅額之營業人，銷售其非經常買進、賣出而持有之固定資產"], answer:0, explain:'' },
  { id:'q111_13', law:"營業稅法", chapter:"稅額計算", year:111, q:"依加值型及非加值型營業稅法及相關規定，營業人是某觀光飯店，下列那一項進項稅額，不得扣抵銷項稅額？", options:["購買載運貨物用小貨車", "購置總經理專用五人座座車", "購買載運員工上、下班用大型客車", "購置至機場接送旅客之客貨兩用車"], answer:1, explain:'' },
  { id:'q111_14', law:"營業稅法", chapter:"稽徵", year:111, q:"依加值型及非加值型營業稅法及相關規定，有關統一發票之敘述，下列何者正確？", options:["全部營業人皆可使用收銀機統一發票", "使用收銀機開立統一發票之營業人，亦適用「每日彙開發票」之規定", "使用發票之營業人，於開立發票時，應依時序開立", "營業人支付各項費用而取具載有買受人營利事業統一編號之進項發票，亦可參加統一發票兌奬"], answer:2, explain:'' },
  { id:'q111_15', law:"營業稅法", chapter:"稅額計算", year:111, q:"依加值型及非加值型營業稅法規定，甲公司是一間銷售應稅貨物的零售商，假設本期甲公司總共僅開立3張二聯式統一發票，金額分別為1,200元、5,000元及3,600元，甲公司本期依法應申報之銷售額為多少？", options:["490元", "9,333元", "9,800元", "10,290元"], answer:1, explain:'' },
  { id:'q111_16', law:"營業稅法", chapter:"稅率", year:111, q:"依加值型及非加值型營業稅法及相關法規規定，為因應經濟特殊情況，調節物資供應，行政院得對進口下列何種貨物機動調整應徵之營業稅？", options:["蕎麥", "飼料", "麵粉", "玉米"], answer:3, explain:'' },
  { id:'q111_17', law:"土地稅法", chapter:"土地增值稅", year:111, q:"A公司於110年7月1日出售1筆自營工廠用地，申報移轉現值總價為6,000萬元，繳納土地增值稅800萬元，於110年12月1日重購另一筆自營工廠用地，申報移轉現值總價為5,600萬元，依土地稅法第35條規定，A公司可以申請退還若干土地增值稅？", options:["0元", "400萬元", "600萬元", "800萬元"], answer:1, explain:'' },
  { id:'q111_18', law:"稅捐稽徵法", chapter:"稽徵", year:111, q:"甲107年綜合所得稅結算申報，經國稅局查獲漏報其他所得，向其補徵稅額新臺幣50萬元，繳款書繳納期間為109年9月1日至109年9月10日。嗣甲因受風災影響，依稅捐稽徵法第26條規定，於109年9月2日向國稅局申請延期繳納，經國稅局核准延期繳納，變更繳納期間為109年9月11日至109年12月10日，該筆稅款之徵收期間於何時屆滿？（題目及選項之期日或期間末日均非例假日）", options:["114年9月9日", "114年9月10日", "114年12月9日", "114年12月10日"], answer:3, explain:'' },
  { id:'q111_19', law:"稅捐稽徵法", chapter:"強制執行", year:111, q:"甲公司因漏開統一發票致短漏報銷售額，經國稅局補徵營業稅新臺幣（下同）100萬元，該筆稅款繳納期間為111年3月1日至111年3月10日，甲公司未提起行政救濟且於繳納期間屆滿30日後仍未繳納，該筆稅款應加徵之滯納金為何？", options:["15萬元", "10萬元", "7萬5千元", "5萬元"], answer:1, explain:'' },
  { id:'q111_20', law:"稅捐稽徵法", chapter:"稽徵", year:111, q:"依稅捐稽徵法規定，甲於111年5月15日繳納111年房屋稅，嗣發現稅捐稽徵機關適用稅率錯誤，致溢繳稅款，其得自繳納之日起幾年內提出具體證明，申請退還？", options:["5年", "10年", "15年", "無期限"], answer:2, explain:'' },
  { id:'q111_21', law:"稅捐稽徵法", chapter:"強制執行", year:111, q:"依稅捐稽徵法規定，甲於109年度綜合所得稅結算申報，因短漏報所得經國稅局補徵稅額，核定稅額通知書及補繳稅款繳款書業合法送達，該筆稅額繳納期間為111年1月11日至111年1月20日，甲於繳納期間屆滿30日後仍未繳納。對於該筆應納稅額應否移送強制執行之敘述，下列何者正確？", options:["甲已依法申請復查中，國稅局仍應移送強制執行", "甲依法申請復查後，對復查決定不服依法提起訴願，並就復查決定之應納稅額依限繳納三分之一，國稅局應暫緩移送強制執行", "甲依法申請復查後，對復查決定不服依法提起訴願，但對復查決定之應納稅額並未繳納，亦未提供相當擔保，經國稅局就甲相當於復查決定應納稅額三分之一之財產，通知有關機關，不得為移轉或設定他項權利者，應暫緩移送強制執行", "甲依法申請復查後，對復查決定不服依法提起訴願，並就復查決定之應納稅額依限繳納三分之一，但對復查決定提起訴願時，已逾訴願之提起期間，國稅局仍應暫緩移送強制執行"], answer:1, explain:'' },
  { id:'q111_22', law:"稅捐稽徵法", chapter:"稽徵", year:111, q:"甲因受風災影響，不能於法定期間內繳清稅捐新臺幣（下同）2,000萬元，爰依稅捐稽徵法第26條規定，向稅捐稽徵機關申請分期繳納，經稅捐稽徵機關核准分10期繳納，每期繳納200萬元。甲繳納2期後，再因受地震影響，就未清繳之餘額稅款依上述規定向稅捐稽徵機關申請分期繳納，稅捐稽徵機關可核准分期繳納期數最長為何？", options:["0期", "10期", "34期", "36期"], answer:2, explain:'' },
  { id:'q111_23', law:"稅捐稽徵法", chapter:"行政救濟", year:111, q:"依稅捐稽徵法規定，對於納稅義務人申請復查之敘述，下列何者正確？", options:["納稅義務人對核定稅捐之處分申請復查時，應先繳納應納稅額或應補稅額之二分之一，稅捐稽徵機關始得受理其復查", "依核定稅額通知書所載有應納稅額或應補徵稅額者，納稅義務人申請復查之期限係自收到繳款書之翌日起算30日內", "納稅義務人復查之申請，係交由郵務機構寄發復查申請書者，以郵寄地郵戳日期為準", "納稅義務人不服稅捐稽徵機關就其財產通知有關機關，不得為移轉或設定他項權利之處分，應向該稅捐稽徵機關申請復查"], answer:2, explain:'' },
  { id:'q111_24', law:"遺產贈與稅法", chapter:"遺產稅之計算", year:111, q:"甲自幼隨父母至葡萄牙定居，入籍葡萄牙，放棄中華民國國籍，嗣甲大學畢業，隻身返臺成家立業，111年1月1日挑戰元旦全馬路跑，不幸心肌炎發作致死，甲遺有宜蘭的豪宅1幢，死亡時公告現值5,600萬元，由妻子及3歲5個月的稚子共同繼承，本件依遺產及贈與稅法規定，應納遺產稅額為何？", options:["414.4萬元", "275.1萬元", "427.7萬元", "288.4萬元"], answer:0, explain:'' },
  { id:'q111_25', law:"遺產贈與稅法", chapter:"總則", year:111, q:"下列何者屬贈與行為，應依遺產及贈與稅法規定課徵贈與稅？", options:["某上市公司的小股東放棄現金增資新股認購權", "獨資商號資本主出資彌補該商號虧損", "父母於子女婚嫁時贈與50萬元現金", "未成年子女購置之不動產，但未能舉證資金來源"], answer:3, explain:'' },
  { id:'q112_01', law:"所得稅法", chapter:"綜合所得稅", year:112, q:"依所得稅法規定，納稅義務人111年度綜合所得稅結算申報時，符合下列那一種情形，不得列報長期照顧特別扣除額或幼兒學前特別扣除額？", options:["採各類所得分開計算稅額方式，經減除該2項扣除額後，本人與其配偶適用稅率分別為20%、12%", "基本所得額650萬元", "符合衛生福利部公告須長期照顧之身心失能者領有身心障礙證明", "納稅義務人列報之子女於106年1月1日出生"], answer:0, explain:'' },
  { id:'q112_02', law:"所得稅法", chapter:"所得基本稅額條例", year:112, q:"個人111年度符合下列何種情形，免依所得基本稅額條例規定計算繳納所得稅？", options:["經常居住中華民國境內之個人，有香港來源所得新臺幣200萬元", "經常居住中華民國境內之個人，有基本所得額新臺幣800萬元", "111年度綜合所得稅結算申報有投資抵減稅額新臺幣1萬元", "外國人111年8月至12月受外國公司派遣來我國工作，取得國外薪資新臺幣800萬元"], answer:3, explain:'' },
  { id:'q112_03', law:"所得稅法", chapter:"營利事業所得稅", year:112, q:"依所得稅法及相關法規規定，營利事業應保持足以正確計算其營利事業所得額之帳簿憑證，下列何者正確？", options:["營利事業設置之帳簿，除未結會計事項外，應至少保存5年", "稽徵機關進行調查時，營利事業未提示各種證明所得額之帳簿、文據，稽徵機關僅得依同業利潤標準核定其所得額", "營利事業遭受不可抗力災害以致帳簿憑證滅失者，應依規定併同災害損失報請稽徵機關派員勘查屬實或提出確實證據證明屬實", "營利事業之帳簿憑證因遭受不可抗力而滅失者，稽徵機關應依同業利潤標準核定其所得額"], answer:2, explain:'' },
  { id:'q112_04', law:"所得稅法", chapter:"營利事業所得稅", year:112, q:"依所得稅法及相關法規規定，甲公司108年度新設立，108年度依商業會計法處理之本期稅後淨利為800萬元，109年4月召開股東會決議分派股利300萬元，另109年12月購買生產用機器200萬元，其申報108年度未分配盈餘加徵之營利事業所得稅金額，下列何者正確？", options:["40萬元", "25萬元", "15萬元", "11萬元"], answer:3, explain:'' },
  { id:'q112_05', law:"所得稅法", chapter:"所得基本稅額條例", year:112, q:"營利事業計算基本所得額時，以所得稅法規定計算之課稅所得額為基礎，加計之各項所得，下列何者非屬加計項目？", options:["依所得稅法規定停徵所得稅之證券交易所得", "依產業創新條例規定智慧財產權研究發展支出加倍減除金額", "依所得稅法規定不計入所得額課稅之股利或盈餘收入", "依國際金融業務條例規定免徵營利事業所得稅之所得額"], answer:2, explain:'' },
  { id:'q112_06', law:"所得稅法", chapter:"營利事業所得稅", year:112, q:"總機構在中華民國境外之A公司，其在臺分公司於107年6月買進一筆土地，與境內甲建設公司合建，於110年9月興建完成並各自出售土地、房屋，A公司110年度營利事業所得稅申報房地合一課徵所得稅適用稅率為何？", options:["45%", "35%", "20%", "15%"], answer:1, explain:'' },
  { id:'q112_07', law:"所得稅法", chapter:"獎懲", year:112, q:"依所得稅法第110條規定，乙公司110年營利事業所得稅結算申報為營業虧損200萬元，稽徵機關查獲短漏報所得60萬元，加計短漏所得額後核定其營利事業所得額仍為虧損，不考量減免處罰情形下，其應處罰鍰金額？", options:["24萬元", "12萬元", "9萬元", "6萬元"], answer:2, explain:'' },
  { id:'q112_08', law:"所得稅法", chapter:"營利事業所得稅", year:112, q:"依所得稅法及相關法規規定，下列何者不符合房地合一課徵所得稅新制有關自住房地租稅優惠之條件？", options:["個人與其配偶及未成年子女於該房屋辦竣戶籍登記連續滿8年", "個人或其配偶於該房屋連續居住滿7年", "個人與其配偶及成年子女於交易前6年內未曾適用自住房地優惠", "房屋在交易前7年內，未曾出租、供營業或執行業務使用"], answer:2, explain:'' },
  { id:'q112_09', law:"所得稅法", chapter:"稽徵程序", year:112, q:"非屬小規模營利事業之獨資合夥組織，依所得稅法相關規定之申報營利事業所得稅方式，下列敘述何者錯誤？", options:["應辦理結算申報", "免辦理暫繳申報", "應辦理未分配盈餘申報", "應辦理清算申報"], answer:2, explain:'' },
  { id:'q112_10', law:"所得稅法", chapter:"獎懲", year:112, q:"依所得稅法及相關法規規定，有關營利事業所得稅申報之罰則，下列敘述何者錯誤？", options:["納稅義務人已依本法規定辦理結算、決算或清算申報，而對依本法規定應申報課稅之所得額有漏報或短報情事者，處以所漏稅額二倍以下之罰鍰", "納稅義務人未依本法規定自行辦理結算、決算或清算申報，而經稽徵機關調查，發現有依本法規定課稅之所得額者，除依法核定補徵應納稅額外，應照補徵稅額，處三倍以下之罰鍰", "納稅義務人為獨資、合夥組織之營利事業者，應就稽徵機關核定短漏之課稅所得額，按所漏稅額之半數計算罰鍰", "營利事業已依所得稅法第102條之2規定辦理申報，但有漏報或短報未分配盈餘者，處以所漏稅額一倍以下之罰鍰"], answer:2, explain:'' },
  { id:'q112_11', law:"營業稅法", chapter:"稅率", year:112, q:"依加值型及非加值型營業稅法規定，保險業下列何種收入適用稅率百分之一？", options:["出租房屋收入", "出售固定資產收入", "保險費收入", "再保費收入"], answer:3, explain:'' },
  { id:'q112_12', law:"營業稅法", chapter:"稅率", year:112, q:"依加值型及非加值型營業稅法及相關法規規定，對有二人鋼琴演奏及演唱的鋼琴酒吧（PUB）課徵營業稅時，適用下列那一種稅率？", options:["5%", "10%", "15%", "25%"], answer:2, explain:'' },
  { id:'q112_13', law:"營業稅法", chapter:"稽徵", year:112, q:"依加值型及非加值型營業稅法及相關規定，營業人如有固定營業場所，應於何時向主管稽徵機關申請稅籍登記？", options:["試銷期滿後", "開始營業前", "開始營業後10日內", "無時間限制"], answer:1, explain:'' },
  { id:'q112_14', law:"營業稅法", chapter:"稽徵", year:112, q:"依加值型及非加值型營業稅法及相關規定，經銷家電產品的公司依經銷契約自家電製造商取得的獎勵金，經銷商應如何書立憑證？", options:["應開立統一發票", "應開立銷貨退回或折讓證明單", "應開立進貨退出或折讓證明單", "應開立銀錢收據"], answer:2, explain:'' },
  { id:'q112_15', law:"營業稅法", chapter:"稽徵", year:112, q:"依加值型及非加值型營業稅法及相關規定，外國之事業、機關、團體、組織在我國境內無固定營業場所，銷售電子勞務予境內自然人，年銷售額超過新臺幣多少元，即應依法向主管稽徵機關申請稅籍登記？", options:["48萬元", "36萬元", "24萬元", "12萬元"], answer:0, explain:'' },
  { id:'q112_16', law:"營業稅法", chapter:"減免範圍", year:112, q:"依加值型及非加值型營業稅法及相關法規規定，銷售下列農產品，何者不得免徵營業稅？", options:["水果", "香腸", "糙米", "原木"], answer:1, explain:'' },
  { id:'q112_17', law:"土地稅法", chapter:"地價稅", year:112, q:"依土地稅法規定，每年11月開徵之地價稅，係以當年何日土地登記簿上所記載之土地所有權人為納稅義務人？", options:["1月1日", "8月31日", "9月22日", "12月31日"], answer:1, explain:'' },
  { id:'q112_18', law:"土地稅法", chapter:"地價稅", year:112, q:"依土地稅法規定，有關一般土地適用的地價稅稅率之敘述，下列何者錯誤？", options:["未超過累進起點地價5倍者，課徵10‰", "超過累進起點地價5倍至10倍者，就其超過部分課徵25‰", "超過累進起點地價15倍至20倍者，就其超過部分課徵45‰", "超過累進起點地價20倍以上者，就其超過部分課徵55‰"], answer:0, explain:'' },
  { id:'q112_19', law:"土地稅法", chapter:"土地增值稅", year:112, q:"依土地稅法規定，移轉下列何項土地時，可以申請不課徵土地增值稅？", options:["因繼承而移轉之土地", "因被徵收而移轉之土地", "移轉與自然人之作農業使用的農業用地", "移轉與營利事業之作工廠使用的工業用地"], answer:2, explain:'' },
  { id:'q112_20', law:"土地稅法", chapter:"地價稅", year:112, q:"依土地稅法規定，A公司持有一筆都市計畫公共設施保留地，供其員工做停車使用，該土地課稅總地價為1,000萬元，當年應繳納地價稅額為若干？", options:["10萬元", "6萬元", "2萬元", "0元"], answer:1, explain:'' },
  { id:'q112_21', law:"稅捐稽徵法", chapter:"罰則", year:112, q:"甲營利事業自110年9月1日起至110年10月31日依法規定應給與他人憑證而未給與，以及應自他人取得憑證而未取得，經國稅局於111年1月20日查獲，國稅局於依稅捐稽徵法第44條規定論處違章時，下列敘述何者為正確？", options:["國稅局應就查獲當次查明認定之總額，就甲營利事業未依法規定給與他人憑證及取得憑證之金額，分別依該條第1項規定之罰鍰額度計算罰鍰金額後，分別適用該條第2項關於處罰金額最高不得超過新臺幣（下同）100萬元之規定", "國稅局不須區分甲營利事業未依法規定給與他人憑證及取得憑證之金額，直接就查獲當次查明認定之總額，依該條第1項規定之罰鍰額度計算罰鍰金額，並適用該條第2項關於處罰金額最高不得超過100萬元之規定", "國稅局於計算罰鍰金額時，須就經查明認定之總額，裁處百分之五罰鍰，但最高不得超過100萬元", "國稅局於計算罰鍰金額時，可就經查明認定之總額，裁處百分之五以下罰鍰，但最高可超過100萬元"], answer:0, explain:'' },
  { id:'q112_22', law:"稅捐稽徵法", chapter:"稽徵", year:112, q:"依稅捐稽徵法規定，下列何種情形，稅捐稽徵人員對於納稅義務人之財產、所得、營業、納稅等資料應絕對保守秘密？", options:["債權人持拍賣抵押物裁定，向稅捐稽徵機關申請查調該抵押人之所得資料", "債權人持金錢給付之確定判決，向稅捐稽徵機關申請查調判決所載債務人之財產資料", "法務部行政執行署所屬行政執行分署因辦理公法上金錢給付義務執行事件之需要，經財政部核定後函請稅捐稽徵機關提供納稅義務人之財產、所得、營業及納稅資料", "納稅義務人死亡，其繼承人向稅捐稽徵機關申請查調該納稅義務人之財產及所得資料"], answer:0, explain:'' },
  { id:'q112_23', law:"稅捐稽徵法", chapter:"強制執行", year:112, q:"下列何者非屬稅捐稽徵法第24條規定之租稅保全措施？", options:["辦理禁止處分登記", "向法院聲請裁定拘提管收", "向法院聲請裁定假扣押", "限制出境"], answer:1, explain:'' },
  { id:'q112_24', law:"稅捐稽徵法", chapter:"強制執行", year:112, q:"依稅捐稽徵法及相關法令規定，關於限制出境，下列敘述何者正確？", options:["營利事業欠繳營業稅150萬元，或個人欠稅100萬元，惟有脫產之虞，應予限制出境", "對於限制出境處分不服，應向財政部訴願會提起訴願", "個人應先執行禁止財產移轉或設定他項權利，或申請實施財產假扣押，始得函請內政部限制出境", "個人或營利事業負責人限制出境期間最長不得超過7年"], answer:2, explain:'' },
  { id:'q112_25', law:"所得稅法", chapter:"綜合所得稅", year:112, q:"甲無配偶，育有2名就讀空中大學的子女，甲於112年5月辦理111年度綜合所得稅申報時，列報項目包括免稅額計27.6萬元、標準扣除額12.4萬元、特別扣除額-薪資所得20.7萬元、教育學費5萬元、財產交易損失5萬元，111年度每人基本生活所需費用為19.6萬元，甲得自綜合所得總額中減除之基本生活費差額為何？", options:["0元", "8.8萬元", "18.8萬元", "23.8萬元"], answer:2, explain:'' },
  { id:'q113_01', law:"所得稅法", chapter:"國際租稅", year:113, q:"中華民國境內居住之個人甲透過國外跨境電商於網路架設的訂房交易平台，訂購澎湖飯店一間4人房，並於入住後刷卡給付全額住房費16,000元予該飯店，又澎湖飯店須就上開住房費5%計算平台服務的手續費，支付予該國外跨境電商作為其提供電子勞務的報酬。上開交易有關的所得課稅規定，下列敘述何者錯誤？", options:["該國外跨境電商因係在國外提供電子勞務，故其自我國飯店業者所收取之手續費，非屬中華民國來源所得", "飯店業者應就全額住房費16,000元申報營業收入，並得列報該平台服務手續費", "飯店業者於給付平台服務手續費予該國外跨境電商時，應依規定扣繳所得稅", "居住者甲無須對任何業者扣繳並申報納稅"], answer:0, explain:'' },
  { id:'q113_02', law:"所得稅法", chapter:"綜合所得稅", year:113, q:"納稅義務人甲112年度有下列股利或盈餘，並依所得稅法規定，選擇就其申報戶股利或盈餘合計金額按28%之稅率分開計算應納稅額，由其合併報繳，何者不得適用該課稅規定？", options:["獲配國內公司分配111年度之股利", "獲配合作社分配111年度之盈餘", "獲配獨資合夥事業分配111年度之盈餘", "獲配有限合夥事業分配111年度之盈餘"], answer:2, explain:'' },
  { id:'q113_03', law:"所得稅法", chapter:"所得基本稅額條例", year:113, q:"營利事業計算基本所得額時，以所得稅法規定計算之課稅所得額，所加計之各款所得項目，下列敘述何者正確？", options:["依所得稅法規定免稅之土地交易所得", "依產業創新條例規定適用投資抵減之研究發展支出", "依所得稅法規定不計入課稅所得額之股利或盈餘收入", "依國際金融業務條例規定免徵營利事業所得稅之所得額"], answer:3, explain:'' },
  { id:'q113_04', law:"所得稅法", chapter:"綜合所得稅", year:113, q:"依所得稅法及相關法規規定，有關綜合所得稅列舉扣除額，下列敘述何者錯誤？", options:["得減除之醫藥及生育費列舉扣除額之適用對象，限納稅義務人、配偶或受扶養親屬", "減除之災害損失列舉扣除額之適用對象，限納稅義務人、配偶或受扶養直系親屬", "得減除之保險費列舉扣除額之適用對象，限納稅義務人、配偶或受扶養直系親屬", "得減除之捐贈列舉扣除額之適用對象，限納稅義務人、配偶及受扶養親屬"], answer:1, explain:'' },
  { id:'q113_05', law:"所得稅法", chapter:"國際租稅", year:113, q:"總機構在中華民國境內之甲公司，112年度在境內之所得額為新臺幣（下同）1,000萬元，同年度在美國之分公司所得額為800萬元、已納美國所得稅180萬元；另在日本之分公司為虧損300萬元，甲公司112年度營利事業所得稅申報，得自結算應納稅額中扣抵之國外所得稅金額為多少？", options:["200萬元", "180萬元", "160萬元", "100萬元"], answer:3, explain:'' },
  { id:'q113_06', law:"所得稅法", chapter:"營利事業所得稅", year:113, q:"甲110年10月1日出售下列4筆房屋、土地（房屋使用權），依所得稅法規定，那一筆交易所得不適用房地合一所得稅制？", options:["出售之A房地，甲係於104年12月1日與建商簽約購買成屋，於105年2月1日完成所有權移轉登記", "出售之B房地，甲係於108年10月1日與建商簽約購買預售屋，於110年8月1日完成所有權移轉登記", "出售之C土地，甲係以104年9月1日購入之土地與建商合建分售，建商於106年8月興建完成，並辦妥房屋所有權登記", "出售之D房屋使用權，甲係於104年10月1日與建商簽約購買設定地上權方式之房屋使用權，於105年2月1日取得房屋使用權"], answer:2, explain:'' },
  { id:'q113_07', law:"所得稅法", chapter:"國際租稅", year:113, q:"依所得稅法第43條之4規定，依外國法律設立，實際管理處所在中華民國境內之營利事業，應視為總機構在中華民國境內之營利事業，其條件不包含下列何者？", options:["在境內實際執行主要經營活動", "實際資金來源地為境內", "財務報表之製作或儲存處所在境內", "作成重大經營管理決策者為境內居住者"], answer:1, explain:'' },
  { id:'q113_08', law:"所得稅法", chapter:"所得基本稅額條例", year:113, q:"甲辦理112年度綜合所得稅結算申報時，下列何者應計入個人基本所得額計算課徵基本稅額？", options:["112年甲取得以其母為要保人之人壽保險之死亡給付（97年投保）3,000萬元", "112年甲出售國內上市公司股票，獲利700萬元", "112年甲之全部海外所得為出售一筆位於英國之房地，售價新臺幣2,500萬元，成本及必要費用新臺幣2,450萬元", "甲112年取自國內A公司分配之現金股利100萬元，並採28%稅率分開計稅"], answer:3, explain:'' },
  { id:'q113_09', law:"所得稅法", chapter:"稽徵程序", year:113, q:"依所得稅法及其相關法規規定，扣繳義務人對中華民國境內居住之個人未適用分離課稅及免稅規定之利息所得（未提示儲蓄免扣證），每次給付金額超過多少元須要扣繳稅款？", options:["1,000元", "2,000元", "10,000元", "20,000元"], answer:3, explain:'' },
  { id:'q113_10', law:"所得稅法", chapter:"獎懲", year:113, q:"丁公司已依規定辦理營利事業所得稅結算申報，稽徵機關查核其列報減除捐贈支出超過所得稅法規定之限額，致有短繳稅款之情形，稽徵機關依所得稅法規定處理方式，下列敘述何者正確？", options:["核定補稅並加計利息", "核定補稅並加徵滯納金", "核定補稅並就漏稅額處罰", "核定補稅並加徵滯報金"], answer:0, explain:'' },
  { id:'q113_11', law:"營業稅法", chapter:"稽徵", year:113, q:"依加值型及非加值型營業稅法規定，有關進口貨物，下列敘述何者錯誤？", options:["自國外進入保稅區之保稅貨物，皆免按進口課徵營業稅", "關稅應列入進口貨物之營業稅銷售額", "同批進口貨物完稅價格合計在財政部規定金額以下者，免課徵進口營業稅", "自國外進口外國古物，免課徵營業稅"], answer:3, explain:'' },
  { id:'q113_12', law:"營業稅法", chapter:"稅額計算", year:113, q:"依加值型及非加值型營業稅法及相關法規規定，下列敘述何者正確？", options:["銀行業經營非專屬本業之銷售額部分，得申請按銷項稅額扣減進項稅額方式計算營業稅額", "進項稅額憑證申報扣抵期間，以5年為限", "分期付款銷售貨物並約定按期應收取價款者，買方若未依約付款，得免按期開立統一發票申報銷售額與營業稅額", "放棄適用免徵營業稅規定之營業人，5年內不得變更恢復適用免稅規定"], answer:0, explain:'' },
  { id:'q113_13', law:"營業稅法", chapter:"減免範圍", year:113, q:"依加值型及非加值型營業稅法及相關法規規定，下列何者不適用免徵營業稅之規定？", options:["療養院收取之病房住宿費", "依護理機構分類設置標準設置之產後護理機構收取之住房費", "學校依法辦理國小兒童課後照顧服務機構收取之課後輔導費", "私立學校提供該校在學學生屬教育勞務之遊學服務收入"], answer:1, explain:'' },
  { id:'q113_14', law:"營業稅法", chapter:"罰則", year:113, q:"依加值型及非加值型營業稅法規定，營業人有下列何種情形，稽徵機關得停止其營業？", options:["未依規定申請稅籍登記者", "未依規定申請變更、註銷登記或申報暫停營業、復業者", "開立統一發票，應行記載事項未依規定記載或所載不實者", "營業人漏開統一發票或於統一發票上短開銷售額，於法定申報期限前經查獲，且1年內經查獲達3次者"], answer:3, explain:'' },
  { id:'q113_15', law:"營業稅法", chapter:"稽徵", year:113, q:"依加值型及非加值型營業稅法規定，營業人如未繳清稅款（營業稅）或未提供擔保，下列何種情形，仍得變更稅籍登記？", options:["變更負責人", "變更營業人名稱", "變更地址", "減少資本"], answer:2, explain:'' },
  { id:'q113_16', law:"土地稅法", chapter:"土地增值稅", year:113, q:"依土地稅法規定，土地所有權人出售其自用住宅用地，原申請按一般用地稅率課徵土地增值稅，但得於下列何項日期前，向稽徵機關補行申請改按自用住宅用地稅率核課土地增值稅？", options:["繳納期間屆滿前", "收到稽徵機關核定一般用地稅率通知之次日起30日內", "訂定契約日之日起60日內", "申報土地移轉現值之次日起60日內"], answer:0, explain:'' },
  { id:'q113_17', law:"土地稅法", chapter:"地價稅", year:113, q:"甲有土地一筆，辦理信託，受託人為乙，受益人為丙。信託契約期間內，乙基於甲之意旨為管理目的，向丁銀行辦理抵押借款；依土地稅法及相關法規規定，在信託關係存續期間，該筆土地地價稅納稅義務人為何？", options:["甲", "乙", "丙", "丁銀行"], answer:1, explain:'' },
  { id:'q113_18', law:"稅捐稽徵法", chapter:"強制執行", year:113, q:"依稅捐稽徵法及相關法規規定，有關稅款擔保品的種類及計值方式，下列敘述何者正確？", options:["黃金按9折計算", "上市或上櫃股票以收盤價計值，再按9折計算", "公司債券以成交價計值，再按8折計算", "道路用地以列入徵收補償計畫者為限，以土地公告現值加4成估算"], answer:0, explain:'' },
  { id:'q113_19', law:"稅捐稽徵法", chapter:"強制執行", year:113, q:"依稅捐稽徵法及相關法規規定，有關限制出境處分，下列敘述何者正確？", options:["在中華民國境內居住之個人或在中華民國境內之營利事業，對欠繳之應納稅捐（不含罰鍰）已達限制出境金額標準且依法申請復查，在復查程序終結前，該個人或營利事業隱匿或處分財產，有規避稅捐執行之虞者，稅捐稽徵機關不得報財政部函請內政部移民署限制該個人或營利事業負責人出境", "欠稅人或欠稅營利事業負責人對限制出境處分不服，應向報財政部函請內政部移民署限制出境之稅捐稽徵機關申請復查", "限制出境之期間，自內政部移民署限制出境之日起，可逾5年", "經限制出境之欠稅人或欠稅營利事業負責人，依規定向稅捐稽徵機關提供相當擔保後，解除出境限制"], answer:3, explain:'' },
  { id:'q113_20', law:"稅捐稽徵法", chapter:"稽徵", year:113, q:"依稅捐稽徵法及相關法規規定，關於徵收期間，下列敘述何者正確？", options:["徵收期間應予扣除公司清算申報債權期間", "徵收期間應予扣除暫緩執行之期間", "徵收期間應予扣除逾期申請復查期間", "徵收期間應予扣除查對更正期間"], answer:1, explain:'' },
  { id:'q113_21', law:"稅捐稽徵法", chapter:"罰則", year:113, q:"甲公司112年度營利事業所得結算申報案件，嗣經國稅局查得該公司出售資產交易涉有租稅規避情事，核定應補繳營利事業所得稅100萬元，並加徵租稅規避滯納金15萬元，稅單繳納期間末日適逢星期六（次週一為上班日），納稅義務人於次週五始至銀行繳納。依稅捐稽徵法第20條規定，應加徵多少滯納金？", options:["1萬元", "1.15萬元", "2萬元", "2.3萬元"], answer:0, explain:'' },
  { id:'q113_22', law:"稅捐稽徵法", chapter:"納稅者權利保護法", year:113, q:"稅捐核課或處罰應恪遵正當法律程序，依納稅者權利保護法及相關法規規定，下列敘述何者錯誤？", options:["國稅局所為課稅或處罰，應以書面敘明理由及法律依據", "納稅義務人應就課稅或處罰之要件事實，負證明責任", "國稅局違法調查所取得之證據，不得作為認定課稅或處罰之基礎", "國稅局依職權調查證據，不受當事人主張之拘束，對有利及不利事項一律注意"], answer:1, explain:'' },
  { id:'q113_23', law:"稅捐稽徵法", chapter:"稽徵", year:113, q:"依稅捐稽徵法規定，有關停止並追回納稅義務人享受租稅優惠待遇，下列敘述何者錯誤？", options:["納稅義務人逃漏稅捐情節重大者，財政部應停止並追回其違章行為所屬年度享受租稅優惠之待遇", "納稅義務人違反環境保護、勞工、食品安全衛生相關法律且情節重大，租稅優惠法律之中央主管機關應通知財政部停止並追回其違章行為所屬年度享受租稅優惠之待遇", "納稅義務人違反環境保護、勞工、食品安全衛生相關法律且情節重大，租稅優惠法律之中央主管機關應通知財政部停止並追回其違章行為所屬年度及以前年度享受租稅優惠之待遇", "停止並追回享受租稅優惠之待遇者，財政部應於該停止並追回處分確定年度之次年，公告納稅義務人之姓名或名稱"], answer:2, explain:'' },
  { id:'q113_24', law:"稅捐稽徵法", chapter:"納稅者權利保護法", year:113, q:"依納稅者權利保護法規定，國稅局查得甲於111年2月間代償其子所積欠鉅額銀行借款，涉有應課徵贈與稅情事，乃發函請甲於指定期日至國稅局備詢，為保障甲受調查時之權利，下列敘述何者錯誤？", options:["甲因不諳稅法，可委請會計師陪同備詢，於代理人到場前，可拒絕陳述", "甲於到場接受調查時，得自行就調查過程錄影、錄音，以保障其權利", "國稅局依法行使調查權，有錄影、錄音之需要，亦應告知被調查者", "為維持稅捐調查秘密性，且經記明筆錄者，國稅局得拒絶錄影、錄音"], answer:1, explain:'' },
  { id:'q113_25', law:"遺產贈與稅法", chapter:"稽徵程序", year:113, q:"甲112年1月31日死亡，死亡日遺有應課遺產稅的土地一筆公告現值新臺幣（下同）3,000萬元，以及國內上市公司T股票100,000股，當日收盤價每股100元，其應納之遺產稅為200萬元，因甲死亡後T公司之股票收盤價大幅下跌，故繼承人乃申請以T公司股票抵繳稅款，其得抵繳稅款之金額為多少？", options:["40萬元", "50萬元", "100萬元", "200萬元"], answer:1, explain:'' },

/**
 * 條文瀏覽資料格式：
 * {
 *   law: '所得稅法及所得基本稅額條例',
 *   chapters: [
 *     {
 *       name: '第一章 總則',
 *       statutes: [
 *         { label: '第1條', text: '條文內容...' }
 *       ]
 *     }
 *   ]
 * }
 */
// 條文連結：點擊跳到全國法規資料庫
const STATUTE_LINKS = [
  { law:'所得稅法',              icon:'📘', pcode:'G0340003' },
  { law:'所得基本稅額條例',        icon:'📗', pcode:'G0340115' },
  { law:'加值型及非加值型營業稅法', icon:'📙', pcode:'G0340080' },
  { law:'土地稅法',              icon:'🏞️', pcode:'G0340096' },
  { law:'稅捐稽徵法',            icon:'⚖️', pcode:'G0340001' },
  { law:'納稅者權利保護法',        icon:'🛡️', pcode:'G0340142' },
  { law:'遺產及贈與稅法',         icon:'📜', pcode:'G0340072' },
];

// ════════════════════════════════════════════════
//  LocalStorage
// ════════════════════════════════════════════════
const LS_WRONG  = 'tax_wrong_ids';
const LS_FC     = 'tax_fc_score';

function getWrongIds() {
  try { return JSON.parse(localStorage.getItem(LS_WRONG)) || []; } catch { return []; }
}
function setWrongIds(ids) {
  localStorage.setItem(LS_WRONG, JSON.stringify([...new Set(ids)]));
}
function addWrong(id) { setWrongIds([...getWrongIds(), id]); }
function removeWrong(id) { setWrongIds(getWrongIds().filter(x => x !== id)); }
function isWrong(id) { return getWrongIds().includes(id); }

function getFcScore() {
  try { return JSON.parse(localStorage.getItem(LS_FC)) || {}; } catch { return {}; }
}
function setFcScore(obj) { localStorage.setItem(LS_FC, JSON.stringify(obj)); }

// ════════════════════════════════════════════════
//  TAB SWITCHER
// ════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const idx = ['quiz','flashcard','statute'].indexOf(name);
  document.querySelectorAll('nav.tabs button')[idx].classList.add('active');
  if (name === 'flashcard') renderFlashcard();
  if (name === 'statute') renderStatute();
  if (name === 'quiz') applyFilters();
}

// ════════════════════════════════════════════════
//  QUIZ
// ════════════════════════════════════════════════
let filteredQuestions = [];
let currentQIndex = 0;
let wrongOnlyMode = false;

const CHAPTER_MAP = {
  '所得稅法': ['總則','綜合所得稅','營利事業所得稅','稽徵程序','獎懲','賦稅減免','所得基本稅額條例','國際租稅'],
  '營業稅法': ['總則','減免範圍','稅率','稅額計算','稽徵','罰則'],
  '土地稅法': ['總則','地價稅','田賦','土地增值稅','稽徵程序','罰則'],
  '稅捐稽徵法': ['總則','納稅義務','稽徵','行政救濟','強制執行','罰則','納稅者權利保護法'],
  '遺產贈與稅法': ['總則','遺產稅之計算','贈與稅之計算','稽徵程序','獎懲'],
};

document.getElementById('q-law').addEventListener('change', function() {
  const chSel = document.getElementById('q-chapter');
  chSel.innerHTML = '<option value="">全部章節</option>';
  const chapters = CHAPTER_MAP[this.value] || [];
  chapters.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    chSel.appendChild(o);
  });
  applyFilters();
});

function applyFilters() {
  const law = document.getElementById('q-law').value;
  const ch  = document.getElementById('q-chapter').value;
  const wrongIds = getWrongIds();

  filteredQuestions = QUIZ_DATA.filter(q => {
    if (law && q.law !== law) return false;
    if (ch  && q.chapter !== ch) return false;
    if (wrongOnlyMode && !wrongIds.includes(q.id)) return false;
    return true;
  });

  document.getElementById('q-count-label').textContent = `共 ${filteredQuestions.length} 題`;
  currentQIndex = 0;
  renderQuiz();
}

function toggleWrongOnly() {
  wrongOnlyMode = !wrongOnlyMode;
  const t = document.getElementById('wrong-toggle');
  t.classList.toggle('on', wrongOnlyMode);
  applyFilters();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  if (filteredQuestions.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">${wrongOnlyMode ? '🎉' : '📭'}</div><p>${wrongOnlyMode ? '目前沒有錯題記錄！' : '考古題尚未匯入<br><small style="font-size:.75rem;opacity:.7;">請填入 QUIZ_DATA 陣列</small>'}</p></div>`;
    return;
  }
  const q = filteredQuestions[currentQIndex];
  const pct = Math.round(((currentQIndex + 1) / filteredQuestions.length) * 100);
  const wrongBadge = isWrong(q.id) ? `<span class="tag tag-wrong">錯題</span>` : '';

  area.innerHTML = `
    <div class="quiz-progress">${currentQIndex + 1} / ${filteredQuestions.length}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="quiz-meta">
        <span class="tag tag-law">${q.law}</span>
        <span class="tag tag-year">${q.year || ''} 年</span>
        <span class="tag tag-law" style="background:var(--paper-dark);color:var(--slate);border-color:var(--border);">${q.chapter}</span>
        ${wrongBadge}
      </div>
      <div class="quiz-q">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, i) =>
          `<button class="option-btn" id="opt-${i}" onclick="selectOption(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`
        ).join('')}
      </div>
      ${q.explain ? `<div class="quiz-explain" id="quiz-explain">${q.explain}</div>` : ''}
    </div>
    <div class="quiz-nav">
      <button class="btn btn-outline" onclick="navQ(-1)" ${currentQIndex===0?'disabled':''}>← 上題</button>
      <button class="btn btn-outline" onclick="navQ(1)"  ${currentQIndex===filteredQuestions.length-1?'disabled':''}>下題 →</button>
    </div>
  `;
  updateStats();
}

function selectOption(chosen) {
  const q = filteredQuestions[currentQIndex];
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    else if (i === chosen && chosen !== q.answer) b.classList.add('wrong');
  });
  if (chosen === q.answer) {
    removeWrong(q.id);
  } else {
    addWrong(q.id);
  }
  const ex = document.getElementById('quiz-explain');
  if (ex) ex.classList.add('show');
  updateStats();
}

function navQ(dir) {
  currentQIndex = Math.max(0, Math.min(filteredQuestions.length - 1, currentQIndex + dir));
  renderQuiz();
}

// ════════════════════════════════════════════════
//  FLASHCARD
// ════════════════════════════════════════════════
let fcFilter = 'all';
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;

function setFcFilter(type, btn) {
  fcFilter = type;
  document.querySelectorAll('.fc-tag-btn').forEach(b => {
    b.classList.remove('active-all','active-num','active-text','active-quiz');
  });
  if (type === 'all') btn.classList.add('active-all');
  else if (type === '數字') btn.classList.add('active-num');
  else if (type === '條文') btn.classList.add('active-text');
  else if (type === '考題') btn.classList.add('active-quiz');
  renderFlashcard();
}

function renderFlashcard() {
  const lawF = document.getElementById('fc-law-filter').value;
  fcDeck = FLASHCARD_DATA.filter(c => {
    if (fcFilter !== 'all' && c.type !== fcFilter) return false;
    if (lawF && c.law !== lawF) return false;
    return true;
  });
  fcIndex = 0;
  fcFlipped = false;
  showFcCard();
}

function showFcCard() {
  const inner = document.getElementById('fc-inner');
  inner.classList.remove('flipped');
  fcFlipped = false;
  document.getElementById('fc-actions').style.display = 'none';

  if (fcDeck.length === 0) {
    document.getElementById('fc-empty').style.display = 'block';
    document.getElementById('fc-counter').style.display = 'none';
    document.getElementById('fc-front').style.opacity = '.4';
    document.getElementById('fc-q').textContent = '目前篩選條件下無字卡';
    document.getElementById('fc-a').textContent = '';
    updateFcScore();
    return;
  }

  document.getElementById('fc-empty').style.display = 'none';
  document.getElementById('fc-counter').style.display = 'block';
  document.getElementById('fc-front').style.opacity = '1';

  const c = fcDeck[fcIndex];
  const badgeMap = { '數字': '🟢 數字', '條文': '🟠 條文', '考題': '🟣 考題改編' };
  document.getElementById('fc-type-badge').textContent = badgeMap[c.type] || c.type;
  document.getElementById('fc-q').textContent = c.q;
  document.getElementById('fc-a').textContent = c.a;
  document.getElementById('fc-source').textContent = c.source || '';
  document.getElementById('fc-counter').textContent = `字卡 ${fcIndex + 1} / ${fcDeck.length}`;

  const pct = fcDeck.length > 1 ? (fcIndex / (fcDeck.length - 1)) * 100 : 100;
  document.getElementById('fc-progress').style.width = pct + '%';

  updateFcScore();
}

function flipCard() {
  if (fcDeck.length === 0) return;
  fcFlipped = !fcFlipped;
  document.getElementById('fc-inner').classList.toggle('flipped', fcFlipped);
  document.getElementById('fc-actions').style.display = fcFlipped ? 'flex' : 'none';
}

function fcAnswer(know) {
  const c = fcDeck[fcIndex];
  const score = getFcScore();
  score[c.id] = know ? 1 : 0;
  setFcScore(score);
  updateFcScore();
  setTimeout(() => { fcSkip(1); }, 300);
}

function fcSkip(dir) {
  fcIndex = (fcIndex + dir + fcDeck.length) % fcDeck.length;
  showFcCard();
}

function shuffleFc() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0;
  showFcCard();
}

function updateFcScore() {
  const score = getFcScore();
  const relevant = fcDeck.map(c => score[c.id]);
  const know = relevant.filter(v => v === 1).length;
  const dk   = relevant.filter(v => v === 0).length;
  document.getElementById('fc-know').textContent = know;
  document.getElementById('fc-dk').textContent = dk;

  // update header stat
  const total = Object.values(getFcScore()).filter(v => v === 1).length;
  document.getElementById('stat-fc').textContent = total;
}

// ════════════════════════════════════════════════
//  STATUTE BROWSER
// ════════════════════════════════════════════════
function renderStatute() {
  const tree = document.getElementById('statute-tree');
  tree.innerHTML = STATUTE_LINKS.map(item => `
    <a class="law-link-card"
       href="https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=${item.pcode}"
       target="_blank" rel="noopener noreferrer">
      <span class="law-link-icon">${item.icon}</span>
      <span class="law-link-name">${item.law}</span>
      <span class="law-link-arrow">↗</span>
    </a>
  `).join('');
}

// ════════════════════════════════════════════════
//  STATS
// ════════════════════════════════════════════════
function updateStats() {
  const wrongIds = getWrongIds();
  const answeredWrong = QUIZ_DATA.filter(q => wrongIds.includes(q.id)).length;
  const correct = QUIZ_DATA.length - answeredWrong; // rough approximation
  document.getElementById('stat-wrong-count').textContent = answeredWrong;
  document.getElementById('stat-correct').textContent =
    QUIZ_DATA.length > 0 ? QUIZ_DATA.length - answeredWrong : 0;
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
applyFilters();
updateStats();
updateFcScore();
</script>
